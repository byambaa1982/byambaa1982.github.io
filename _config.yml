# ──────────────────────────────────────────────────────────────
#  Byambalogy — a custom minimal Jekyll theme (Obsidian-study)
# ──────────────────────────────────────────────────────────────

title:       Byambalogy
tagline:     Discovering the beauty within and beyond
description: >-
  Field notes on data engineering, multi-agent AI systems, and building
  production software on the cloud — by Byamba Enkhbat.
url:         "https://byambaa1982.github.io"
baseurl:     ""
lang:        en

author:
  name:    Byamba Enkhbat
  email:   enkhbat@byamba.net
  bio:     Data engineer building multi-agent AI systems on Google Cloud. Father of two, relentless learner.
  github:  byambaa1982
  twitter: techtoninc190427

# Primary navigation
nav:
  - name: Writing
    url:  /
  - name: About
    url:  /about/

# ── Build ──────────────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge
permalink:   /:year/:month/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  style: compressed

defaults:
  - scope: { path: "", type: posts }
    values: { layout: post }
  - scope: { path: "" }
    values: { layout: page }

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - LOOP_ENGINEERING.md
  - vendor
  - node_modules
  - .github
