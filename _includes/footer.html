<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-brand">
      <span class="brand-mark" aria-hidden="true">◈</span>
      <div>
        <p class="footer-title">{{ site.title }}</p>
        <p class="footer-tag">{{ site.tagline }}</p>
      </div>
    </div>

    <nav class="footer-links" aria-label="Footer">
      {%- for item in site.nav -%}
      <a href="{{ item.url | relative_url }}">{{ item.name }}</a>
      {%- endfor -%}
      <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
      {%- if site.author.twitter -%}<a href="https://twitter.com/{{ site.author.twitter }}" target="_blank" rel="noopener">Twitter</a>{%- endif -%}
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      <a href="mailto:{{ site.author.email }}">Email</a>
    </nav>
  </div>
  <p class="colophon wrap">© {{ 'now' | date: "%Y" }} {{ site.author.name }} · Built with Jekyll · Designed in the dark.</p>
</footer>
